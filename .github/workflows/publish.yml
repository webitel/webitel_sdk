name: Publish NPM

on:
  #  https://docs.github.com/en/actions/managing-workflow-runs-and-deployments/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:

permissions:
  id-token: write # OIDC for npm trusted publishing, https://docs.npmjs.com/trusted-publishers
  contents: write # push the version bump + tag back

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Bump, build and publish
        run: |
          npm ci
          echo "VERSION=$(npm version patch --no-git-tag-version)" >> "$GITHUB_ENV"
          npm run build
          npm run release

      # Commit the version bump + synced version.ts back and tag the release.
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(release): ${{ env.VERSION }} [skip ci]'
          commit_options: '--no-verify'
          tagging_message: ${{ env.VERSION }}
          file_pattern: 'package.json package-lock.json src/version.ts'
